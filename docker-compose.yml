version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: yunjin-postgres
    environment:
      POSTGRES_DB: yunjin_weaving
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d yunjin_weaving"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - yunjin-net

  mqtt-broker:
    image: eclipse-mosquitto:2
    container_name: yunjin-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    restart: unless-stopped
    networks:
      - yunjin-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: yunjin-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/yunjin_weaving
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      WEAVING_SIMULATION_TENSION_BASE: 2.2
      WEAVING_SIMULATION_FRICTION_COEFFICIENT: 0.28
      WEAVING_SIMULATION_AUTO_ADVANCE: "false"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks:
      - yunjin-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: yunjin-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - yunjin-net

  simulator:
    build:
      context: ./simulator
      dockerfile: Dockerfile
    container_name: yunjin-simulator
    environment:
      LOOM_ID: 1
      API_BASE: http://backend:8080/api
      INTERVAL: 1.0
      PATTERN: dragon_cloud
      TENSION_PROFILE: normal
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - yunjin-net

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: yunjin-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - yunjin-net

  grafana:
    image: grafana/grafana:10.2.0
    container_name: yunjin-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    restart: unless-stopped
    networks:
      - yunjin-net

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  yunjin-net:
    driver: bridge
